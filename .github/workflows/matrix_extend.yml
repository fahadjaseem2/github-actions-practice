name: matrix for python and os 

on:  
  push: 
    branhes: [main]

jobs:
  matrix-extend:
    strategy:
      matrix:
        os: [ubuntu-latets, windows-latest]
        python-version: ["3.10","3.11","3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
      - name: check python version
        run: python --version