name: call build

on:
  push:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "prod"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKE }}

  job_2:
    needs: build
    runs-on: ubuntu-latest
    steps: 
      - name: print build version
        run: echo " ${{ needs.build.outputs.build_version }}"
        

    
  