name: secret variable

on: 
  workflow_dispatch:

jobs:
  calling-secret:
    runs-on: ubuntu-latets

    steps:
      - name: checking secret variable
        run: |
          if [ -z "${{ MY_SECRET_MESSAGE }}" ]; then
          echo "secret variable is missing"
          else
          echo "secret variable is present"
          fi 

      - name: print secret 
        run: echo " ${{ secrets.MY_SECRET_MESSAGE }} "