name: docker publish app for day-36

on: 
  push:
    branches: [main]

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Docker Build
        uses: docker/setup-buildx-action@v3

     # - name: docker login
     # run: docker login -u ${{ DOCKER_USERNAME }} -p ${{ DOCKER_TOKEN }}
      - name: docker build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest

      
