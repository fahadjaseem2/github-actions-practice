name: reusable build

on:
  workflow_call:

    inputs:
      app_name: 
        description: enter app name
        required: true
        type: string

      environment:
        description: enter the environment
        required: true
        default: staging
        type: string
      
    secrets:
      docker_token:
        required: true

    outputs:
      build_version:
        description: "generating build version"
        value: ${{ jobs.build.outputs.build_version }}

        
jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      build_version: ${{ steps.set_version.outputs.build_version }}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: print app and environment
        run: echo " Building App is :${{ inputs.app_name }} and environment is :${{ inputs.environment }}"

      - name: set outputs
        id: set_version
        run: |
          VERSION="v1.0.${{ github.sha::7 }}"
          echo "build_version=VERSION" >> $GITHUB_OUTPUT

      # 1 job level
      # “Take build_version from step set_version and assign it as job output”

      # 2. Workflow level
      # “Take build_version from job build and expose it to caller”

      # Step level:
      #  creates output named build_version

      # Step → gives parcel named "build_version"
      # Job → receives and forwards same parcel
      # Workflow → exposes parcel outside

      - name: set docker token
        run: |
          if [ -z "${{ secrets.DOCKER_TOKE }}" ]; then
            echo "Docker token is set"
          else
            echo "Docker token is not set"
          fi      

