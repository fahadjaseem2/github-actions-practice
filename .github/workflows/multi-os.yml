name: multi os

on:
  push:
    branches: [main]

jobs:
  ubuntu-job: 
    runs-on: ubuntu-latest
    steps:
      - name: print runner info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
      - name: check docker,python,node and git version
        run: |
          python --version
          docker --version
          node --version
          git --version

  macos-job:
    runs-on: macos-latest
    steps:
      - name: print runner info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
  
  windows-job:
    runs-on: windows-latest
    steps:
      - name: print runner info
        run: |
          echo OS: %OS%
          hostname
          echo User: %USERNAME%
