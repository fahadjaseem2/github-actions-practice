# API Keys, sensitive data , creditials
# git leaks
name: secrets scan

on:
  workflow_call:

jobs:
  secrets-scan:
    runs-on: ubuntu-latets

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run gitleaks scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # its manage by github
