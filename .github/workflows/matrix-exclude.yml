name: matrix exclude

on:
  push:
    branches: [main]

jobs:
  matrix-os-exclude:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest,windows-latest]
        python-version: ["3.10","3.11","3.12"]
        exclude:
          - os: windows-latest
          - python-version: "3.11"
  
    runs-on: ${{ matrix.os }}
    steps:
      - name: code checkout
        uses: actions/checkout@v4
      
      - name: setup python
        uses: actions/setup-python@v5

      - name: python version
        run: python --version