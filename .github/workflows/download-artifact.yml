name: Download Artifacts between jobs

on:  
  workflow_dispatch:

jobs:
  upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: generate artifact directory and file
        run: |
          mkdir job-1
          echo "This artifact is created by job-1" > job-1/artifact-1.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-1
          path: job-1/artifact-1.txt

  download-artifact:
    needs: upload-artifact
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifact from another job
        uses: actions/download-artifact@v4
        with:
          name: artifact-1

      - name: print artifact
        run: cat artifact-1.txt